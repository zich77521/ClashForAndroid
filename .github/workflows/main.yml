name: Android Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码，包括子模块（递归）
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. 设置 JDK（Android 构建需要，版本可根据项目调整）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 安装 Android SDK 和 NDK（使用社区 Action）
      #    根据需要安装 platforms, build-tools 和 ndk（版本号请根据项目实际修改）
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-33
            build-tools;33.0.2
            ndk;25.2.9519653

      # 4. 安装 Go（如果项目需要）
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'   # 根据项目需要调整

      # 5. 生成 local.properties
      #    ANDROID_HOME 由 setup-android 自动设置，NDK 路径动态查找
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          # 查找已安装的 NDK 路径（假设只有一个版本）
          NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d -name "*" | tail -n1)
          if [ -n "$NDK_PATH" ]; then
            echo "ndk.dir=$NDK_PATH" >> local.properties
          else
            echo "Warning: NDK not found, please check installation."
            exit 1
          fi

      # 6. 解密 google-services.json 文件（需提前将文件 base64 编码后存入 Secrets）
      #    在 GitHub 仓库 Settings -> Secrets and variables -> Actions 中添加 secret: GOOGLE_SERVICES_JSON
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON secret is not set, skipping."
          fi

      # 7. 为 gradlew 添加执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 8. 缓存 Gradle 依赖和 wrapper（加速后续构建）
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 9. 执行构建（等同于 ./gradlew build）
      - name: Build with Gradle
        run: ./gradlew build

      # 10. （可选）上传生成的 APK 文件作为构建产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/aa/run.apk
